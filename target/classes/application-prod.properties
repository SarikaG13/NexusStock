# ===========================
# NexusStock — Production Profile (MySQL)
# ===========================

# MySQL via environment variables
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:nexusstock}?useSSL=true&serverTimezone=UTC
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:nexusstock_user}
spring.datasource.password=${DB_PASSWORD:changeme}

# Connection Pool
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:20}
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.cache=true

# Security
server.port=${SERVER_PORT:8080}
server.error.include-message=never

# H2 Console disabled
spring.h2.console.enabled=false

# Logging
logging.level.com.nexusstock=INFO
logging.level.org.hibernate.SQL=WARN
